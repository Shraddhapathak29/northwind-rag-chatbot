# Render Blueprint — one-click deploy of DB + API + Web.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy:
#   1. Set OPENAI_API_KEY on the northwind-api service (marked sync:false).
#   2. Set NEXT_PUBLIC_API_BASE on northwind-web to the API's public URL
#      (e.g. https://northwind-api.onrender.com) and trigger a redeploy — it is
#      baked into the client bundle at build time.

databases:
  - name: northwind-db
    plan: free
    postgresMajorVersion: "16"
    # Render's managed Postgres supports the pgvector extension out of the box;
    # the app issues `CREATE EXTENSION IF NOT EXISTS vector` during ingest.

services:
  - type: web
    name: northwind-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: northwind-db
          property: connectionString
      # Hugging Face access token (hf_...). Set this in the Render dashboard.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://router.huggingface.co/v1
      # Use a current model; add a :provider suffix to pin one if auto-routing
      # 403s ("provider not available"). e.g. :nebius :hyperbolic :novita
      - key: CHAT_MODEL
        value: meta-llama/Llama-3.3-70B-Instruct
      # Empty so open HF models don't reject the reasoning_effort param.
      - key: REASONING_EFFORT
        value: ""
      # Embeddings run locally (fastembed) — no embeddings API key needed.
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIM
        value: "384"
      - key: BUSINESS_TODAY
        value: "2026-06-15"
      - key: CORS_ALLOW_ORIGINS
        value: "*"

  - type: web
    name: northwind-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      # Declared as ARG in the frontend Dockerfile -> supplied as a build arg.
      - key: NEXT_PUBLIC_API_BASE
        sync: false
